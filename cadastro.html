<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <h1>BEM VINDO A Pizzaria Bella Massa</h1>
    <p1>Faça login para continuar</p1>
    <form id="form-cadastro">
    <div class="campo">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Digite seu nome">
    </div>
    <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email">
    </div>
    <div class="campo">
        <label for="telefone">Telefone</label>s 
        <input type="tel" id="telefone" placeholder="Digite seu telefone (apenas numeros)">
    </div>
    <div class="campo">
    <label for="senha">Crie uma Senha</label>
    <input type="password" id="senha" placeholder="Crie uma senha segura">
    </div>
    </form>
    <button type="submit" id="btn-cadastrar">Criar Minha Conta</button>
</body>
</html>
